    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      @keyframes fadeInUp {
        0% {
          opacity: 0;
          transform: translateY(30px);
        }
        100% {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes moveStars {
        from {
          transform: translateY(0);
        }
        to {
          transform: translateY(-100px);
        }
      }

      .stars-bg {
        animation: moveStars 20s linear infinite;
        background-image:
          radial-gradient(1px 1px at 15% 20%, #ffffff, transparent),
          radial-gradient(1px 1px at 30% 65%, #ffffff, transparent),
          radial-gradient(2px 2px at 50% 35%, #ffffff, transparent),
          radial-gradient(1px 1px at 65% 80%, #ffffff, transparent),
          radial-gradient(1px 1px at 85% 15%, #ffffff, transparent),
          radial-gradient(2px 2px at 90% 60%, #ffffff, transparent),
          radial-gradient(1px 1px at 10% 85%, #ffffff, transparent);
        background-size: 250px 250px;
        opacity: 0.3;
      }

      .animate-fade-in-up {
        opacity: 0;
        animation: fadeInUp 0.8s ease-out forwards;
      }

      .delay-100 {
        animation-delay: 100ms;
      }
      .delay-200 {
        animation-delay: 200ms;
      }
      .delay-300 {
        animation-delay: 300ms;
      }
      .delay-400 {
        animation-delay: 400ms;
      }
      .delay-500 {
        animation-delay: 500ms;
      }
    </style>
  </head>

  <body
    class="text-[#eaeaea] font-['Inter'] bg-[#050505] min-h-screen relative overflow-x-hidden flex flex-col"

    <!--header-->

<!--script-->
    <script src="js/script.js"></script>
<script>
  const menuBtn = document.getElementById('menuBtn');
  const mobileMenu = document.getElementById('mobileMenu');

  menuBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    
    const isOpen = mobileMenu.classList.contains('opacity-100');

    if (isOpen) {
      closeNav();
    } else {
      openNav();
    }
  });
  function openNav() {
    mobileMenu.classList.remove('invisible', 'opacity-0', '-translate-y-4');
    mobileMenu.classList.add('opacity-100', 'translate-y-0');
  }
  function closeNav() {
    mobileMenu.classList.add('invisible', 'opacity-0', '-translate-y-4');
    mobileMenu.classList.remove('opacity-100', 'translate-y-0');
  }
  window.addEventListener('click', () => {
    closeNav();
  });
  mobileMenu.addEventListener('click', (e) => {
    e.stopPropagation();
  });
</script>
